<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Pulse — дашборд продаж для Битрикс24</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAF9F6;
    --surface: #FFFFFF;
    --surface-glass: rgba(255,255,255,0.62);
    --ink: #14151A;
    --ink-soft: #6B6E76;
    --line: #E7E5DE;
    --line-soft: rgba(20,21,26,0.07);
    --accent: #C6F135;
    --accent-strong: #AEDA1E;
    --accent-ink: #333D00;
    --blue: #2F6FED;
    --teal: #14B8A6;
    --amber: #F59E0B;
    --red: #EF4444;
    --violet: #8B5CF6;
    --green-good: #16A34A;
    --red-bad: #DC2626;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
  .wrap{max-width:1180px;margin:0 auto;padding:32px 24px 64px;position:relative;}
  .glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:640px;height:280px;background:var(--accent);opacity:.16;filter:blur(80px);border-radius:50%;pointer-events:none;z-index:0;}
  .wrap > *{position:relative;z-index:1;}
 
  .topbar{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:32px;}
  .brand-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 8px;}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;margin:0;letter-spacing:-0.01em;}
  .sub{color:var(--ink-soft);font-size:14px;margin-top:8px;}
 
  .connect-box{background:var(--surface-glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--line-soft);border-radius:16px;padding:16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-width:340px;}
  .connect-box input, .connect-box select{flex:1;min-width:160px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--ink);background:#FFFFFFAA;}
  #crmSelect{min-width:150px;flex:0 0 auto;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;}
  .crm-soon{color:var(--ink-soft);}
  .connect-box input:focus{outline:none;border-color:var(--accent-strong);box-shadow:0 0 0 3px rgba(198,241,53,0.25);}
  .btn{font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;border:none;border-radius:9px;padding:10px 16px;cursor:pointer;transition:transform .15s ease, opacity .15s ease, box-shadow .15s ease;white-space:nowrap;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);color:var(--accent-ink);font-weight:700;}
  .btn-primary:hover{background:var(--accent-strong);box-shadow:0 4px 14px rgba(198,241,53,0.35);}
  .btn-primary:disabled{opacity:.5;cursor:default;box-shadow:none;}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
  .btn-ghost:hover{background:#00000006;border-color:var(--ink-soft);}
  select.btn-ghost{font-family:'Inter',sans-serif;}
 
  .status-line{font-size:12.5px;color:var(--ink-soft);margin-top:8px;}
  .status-line.err{color:var(--red-bad);}
  .status-line.ok{color:var(--green-good);}
 
  .help{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;margin-bottom:24px;font-size:13.5px;line-height:1.65;color:var(--ink-soft);}
  .help b{color:var(--ink);}
  .help code{background:#00000008;padding:1px 6px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);}
  .help ol{margin:8px 0 0;padding-left:20px;}
 
  .warning-banner{background:#FFF7ED;border:1px solid var(--amber);color:#92400E;border-radius:16px;padding:16px 24px;margin-bottom:24px;font-size:13px;line-height:1.55;}
  .warning-banner b{display:block;margin-bottom:4px;}
 
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(20,21,26,0.06);border-color:var(--line-soft);}
  .kpi .label{font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-bottom:12px;}
  .kpi .value{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;letter-spacing:-0.01em;transition:opacity .3s ease;}
  .kpi .value small{font-size:14px;font-weight:500;color:var(--ink-soft);margin-left:3px;}
  .delta{display:inline-block;font-size:11.5px;font-weight:600;margin-top:8px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:20px;}
  .delta.up{color:var(--accent-ink);background:rgba(198,241,53,0.35);}
  .delta.down{color:var(--red-bad);background:rgba(220,38,38,0.08);}
  .delta.flat{color:var(--ink-soft);background:#00000006;}
 
  .section-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin:0 0 16px;display:flex;align-items:center;gap:8px;}
  .section-title .n{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);}
 
  .daily-chart{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;margin-bottom:32px;overflow-x:auto;transition:box-shadow .2s ease;}
  .daily-chart:hover{box-shadow:0 8px 24px rgba(20,21,26,0.05);}
  .dbar{cursor:pointer;transition:height .6s cubic-bezier(.16,1,.3,1), y .6s cubic-bezier(.16,1,.3,1), opacity .15s ease;transform-box:fill-box;}
  .dbar:hover{opacity:1 !important;}
  .dline{fill:none;stroke:var(--blue);stroke-width:2;opacity:.55;}
 
  .funnels{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:32px;}
  .fcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;transition:transform .2s ease, box-shadow .2s ease;}
  .fcard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(20,21,26,0.06);}
  .fcard-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .fcard-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16.5px;}
  .fcard-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px;}
  .fcard-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-soft);opacity:.6;}
  .fcard-metrics{display:flex;gap:24px;margin:8px 0 16px;flex-wrap:wrap;}
  .fcard-metrics div .m-label{font-size:11px;color:var(--ink-soft);}
  .fcard-metrics div .m-value{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:15px;margin-top:2px;}
 
  .funnel-svg-wrap{margin:8px 0 8px;}
  .stage-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .stage-table td{padding:6px 0;border-top:1px solid var(--line);}
  .stage-table td.sname{color:var(--ink-soft);}
  .stage-table td.scount{text-align:right;font-family:'JetBrains Mono',monospace;width:40px;color:var(--ink-soft);}
  .stage-table td.ssum{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600;width:110px;}
 
  .managers-wrap{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;margin-bottom:32px;transition:box-shadow .2s ease;}
  .managers-wrap:hover{box-shadow:0 8px 24px rgba(20,21,26,0.05);}
  .managers-table{width:100%;border-collapse:collapse;font-size:13px;}
  .managers-table th{text-align:left;font-family:'JetBrains Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);font-weight:500;padding:0 0 12px;border-bottom:1px solid var(--line);}
  .managers-table th.num, .managers-table td.num{text-align:right;}
  .managers-table td{padding:10px 0;border-top:1px solid var(--line);}
  .managers-table td.mname{font-weight:600;}
  .managers-table td.num{font-family:'JetBrains Mono',monospace;}
  .managers-note{font-size:11.5px;color:var(--ink-soft);margin-top:12px;}
 
  .empty-state{background:var(--surface);border:1px dashed var(--line);border-radius:16px;padding:48px 24px;text-align:center;color:var(--ink-soft);font-size:14px;}
 
  footer{text-align:center;color:var(--ink-soft);font-size:11.5px;margin-top:32px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;gap:8px;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-strong);display:inline-block;animation:pulseDot 2s ease-in-out infinite;}
  @keyframes pulseDot{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
 
  @media (max-width: 860px){
    .kpis{grid-template-columns:repeat(2,1fr);}
    .funnels{grid-template-columns:1fr;}
  }
  @media (max-width: 520px){
    .kpis{grid-template-columns:1fr;}
  }
 
  .spinner{width:14px;height:14px;border-radius:50%;border:2px solid #14151A33;border-top-color:var(--ink);display:inline-block;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg);}}
 
  .periodbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:16px 0 24px;background:var(--surface-glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--line-soft);border-radius:16px;padding:12px 16px;}
  .pbtn{font-family:'Inter',sans-serif;font-weight:600;font-size:12.5px;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);border-radius:20px;padding:8px 16px;cursor:pointer;transition:all .15s ease;}
  .pbtn:hover{border-color:var(--ink-soft);color:var(--ink);}
  .pbtn.active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .custom-range{display:inline-flex;align-items:center;gap:8px;}
  .custom-range input[type=date]{border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink);background:#FFFFFFAA;}
  .custom-range .sep{color:var(--ink-soft);}
  .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
  .period-hint{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;margin-left:8px;}
 
  .toolbar2{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:0 0 24px;}
  .toolbar2 select{border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:12.5px;color:var(--ink-soft);background:var(--surface);cursor:pointer;}
 
  .bar{cursor:pointer;transition:height .7s cubic-bezier(.16,1,.3,1), y .7s cubic-bezier(.16,1,.3,1), opacity .15s ease, transform .15s ease;transform-box:fill-box;transform-origin:center bottom;}
  .bar:hover{opacity:1 !important;transform:scaleY(1.05);}
  .bar-label{transition:opacity .5s ease;}
</style>
</head>
<body>
<div class="wrap">
  <div class="glow"></div>
 
  <div class="topbar">
    <div>
      <p class="brand-eyebrow">Sales Pulse · CRM аналитика</p>
      <h1>Все продажи по воронкам — в одном окне</h1>
      <p class="sub" id="subText">Живые данные напрямую из Битрикс24 через бесплатный вебхук, без программистов и подписок</p>
    </div>
    <div class="connect-box">
      <select id="crmSelect"></select>
      <div id="connFields" style="display:contents"></div>
      <button class="btn btn-primary" id="connectBtn">Подключить</button>
      <button class="btn btn-ghost" id="refreshBtn" style="display:none;">Обновить</button>
    </div>
  </div>
  <div id="statusLine" class="status-line">Ещё не подключено — выберите CRM и введите данные для подключения.</div>
 
  <div class="periodbar" id="periodBar" style="display:none;">
    <button class="pbtn active" data-period="all">Всё время</button>
    <button class="pbtn" data-period="today">Сегодня</button>
    <button class="pbtn" data-period="week">Эта неделя</button>
    <button class="pbtn" data-period="month">Этот месяц</button>
    <button class="pbtn" data-period="custom">Диапазон дат</button>
    <span id="customRange" class="custom-range" style="display:none;">
      <input type="date" id="dateFrom"> <span class="sep">—</span> <input type="date" id="dateTo">
      <button class="btn btn-primary btn-sm" id="applyRangeBtn">Показать</button>
    </span>
    <span class="period-hint">период — по дате создания сделки</span>
  </div>
 
  <div class="toolbar2" id="toolbar2" style="display:none;">
    <select id="autoRefreshSelect">
      <option value="0">Автообновление: выкл</option>
      <option value="5">Обновлять каждые 5 мин</option>
      <option value="10">Обновлять каждые 10 мин</option>
      <option value="30">Обновлять каждые 30 мин</option>
    </select>
    <button class="btn btn-ghost" id="exportBtn">Скачать CSV</button>
  </div>
 
  <div id="dupWarning" class="warning-banner" style="display:none;"></div>
 
  <div class="help" id="helpBox"></div>
 
  <div id="content"></div>
 
  <footer><span class="live-dot"></span>обновлено: <span id="updatedAt">—</span></footer>
</div>
 
<script>
const PALETTE = ['#2F6FED', '#14B8A6', '#F59E0B', '#EF4444', '#8B5CF6', '#0EA5E9'];
 
const crmSelect = document.getElementById('crmSelect');
const connFields = document.getElementById('connFields');
const subText = document.getElementById('subText');
const connectBtn = document.getElementById('connectBtn');
const refreshBtn = document.getElementById('refreshBtn');
const statusLine = document.getElementById('statusLine');
const helpBox = document.getElementById('helpBox');
const content = document.getElementById('content');
const updatedAt = document.getElementById('updatedAt');
const periodBar = document.getElementById('periodBar');
const customRange = document.getElementById('customRange');
const dateFrom = document.getElementById('dateFrom');
const dateTo = document.getElementById('dateTo');
const toolbar2 = document.getElementById('toolbar2');
const autoRefreshSelect = document.getElementById('autoRefreshSelect');
const exportBtn = document.getElementById('exportBtn');
const dupWarning = document.getElementById('dupWarning');
 
let currentPeriod = {type: 'all', from: null, to: null};
let lastFunnels = [];
let lastManagers = [];
let autoRefreshTimer = null;
let currentAdapter = null;
let currentConn = null;
 
function pad2(n){ return String(n).padStart(2,'0'); }
function fmtDateISO(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
 
function computePeriod(type){
  const now = new Date();
  if(type === 'today'){
    return {from: fmtDateISO(now), to: fmtDateISO(now)};
  }
  if(type === 'week'){
    const day = now.getDay();
    const diffToMonday = (day === 0) ? -6 : 1 - day;
    const monday = new Date(now); monday.setDate(now.getDate() + diffToMonday);
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    return {from: fmtDateISO(monday), to: fmtDateISO(sunday)};
  }
  if(type === 'month'){
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    const last = new Date(now.getFullYear(), now.getMonth()+1, 0);
    return {from: fmtDateISO(first), to: fmtDateISO(last)};
  }
  return {from: null, to: null};
}
 
function computePrevPeriod(period){
  if(!period || period.type === 'all' || !period.from || !period.to) return null;
  if(period.type === 'today'){
    const d = new Date(period.from+'T00:00:00'); d.setDate(d.getDate()-1);
    return {from: fmtDateISO(d), to: fmtDateISO(d)};
  }
  if(period.type === 'week'){
    const from = new Date(period.from+'T00:00:00'); from.setDate(from.getDate()-7);
    const to = new Date(period.to+'T00:00:00'); to.setDate(to.getDate()-7);
    return {from: fmtDateISO(from), to: fmtDateISO(to)};
  }
  if(period.type === 'month'){
    const [y,m] = period.from.split('-').map(Number);
    const prevFirst = new Date(y, m-2, 1);
    const prevLast = new Date(y, m-1, 0);
    return {from: fmtDateISO(prevFirst), to: fmtDateISO(prevLast)};
  }
  // custom: тот же по длине период, идущий прямо перед выбранным
  const from = new Date(period.from+'T00:00:00');
  const to = new Date(period.to+'T00:00:00');
  const lengthDays = Math.round((to-from)/86400000);
  const prevTo = new Date(from); prevTo.setDate(prevTo.getDate()-1);
  const prevFrom = new Date(prevTo); prevFrom.setDate(prevFrom.getDate()-lengthDays);
  return {from: fmtDateISO(prevFrom), to: fmtDateISO(prevTo)};
}
document.querySelectorAll('.pbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.period;
    document.querySelectorAll('.pbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if(type === 'custom'){
      customRange.style.display = 'inline-flex';
      if(!dateFrom.value || !dateTo.value){
        const today = fmtDateISO(new Date());
        dateFrom.value = today; dateTo.value = today;
      }
      return; // ждём нажатия "Показать"
    }
    customRange.style.display = 'none';
    const range = computePeriod(type);
    currentPeriod = {type, from: range.from, to: range.to};
    loadDashboard();
  });
});
 
document.getElementById('applyRangeBtn').addEventListener('click', () => {
  if(!dateFrom.value || !dateTo.value) return;
  currentPeriod = {type: 'custom', from: dateFrom.value, to: dateTo.value};
  loadDashboard();
});
 
function normalizeWebhook(url){
  url = url.trim();
  if(!url.endsWith('/')) url += '/';
  return url;
}
 
function appendParams(qs, prefix, value){
  if(Array.isArray(value)){
    value.forEach(v => qs.append(`${prefix}[]`, v));
  } else if(value !== null && value !== undefined && typeof value === 'object'){
    for(const k in value) appendParams(qs, `${prefix}[${k}]`, value[k]);
  } else if(value !== null && value !== undefined){
    qs.append(prefix, value);
  }
}
 
async function callMethod(webhook, method, params){
  const qs = new URLSearchParams();
  for(const k in params) appendParams(qs, k, params[k]);
  const res = await fetch(`${webhook}${method}.json?${qs.toString()}`);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if(data.error) throw new Error(data.error_description || data.error);
  return data;
}
 
async function fetchAllPaged(webhook, method, params){
  let all = [];
  let start = 0;
  while(true){
    const data = await callMethod(webhook, method, {...params, start});
    all = all.concat(data.result);
    if(data.next) start = data.next; else break;
  }
  return all;
}
 
async function fetchCategories(webhook){
  const data = await callMethod(webhook, 'crm.category.list', {entityTypeId: 2});
  return (data.result && data.result.categories) ? data.result.categories : [];
}
 
async function fetchStages(webhook, categoryId){
  const data = await callMethod(webhook, 'crm.dealcategory.stage.list', {id: categoryId});
  return data.result || [];
}
 
async function fetchSemantics(webhook, categoryId){
  const entityId = (String(categoryId) === '0') ? 'DEAL_STAGE' : `DEAL_STAGE_${categoryId}`;
  try{
    const data = await callMethod(webhook, 'crm.status.list', {filter: {ENTITY_ID: entityId}});
    const map = {};
    (data.result || []).forEach(s => { map[s.STATUS_ID] = s.SEMANTICS; });
    return map;
  }catch(e){
    return {};
  }
}
 
function guessSemantic(statusId, map){
  if(map[statusId]) return map[statusId];
  const id = String(statusId).toUpperCase();
  if(id.includes('WON')) return 'S';
  if(id.includes('LOSE') || id.includes('LOST')) return 'F';
  return 'P';
}
 
async function fetchDealsForCategory(webhook, categoryId, period){
  const filter = {CATEGORY_ID: categoryId};
  if(period && period.from) filter['>=DATE_CREATE'] = `${period.from} 00:00:00`;
  if(period && period.to) filter['<=DATE_CREATE'] = `${period.to} 23:59:59`;
  return fetchAllPaged(webhook, 'crm.deal.list', {
    filter,
    select: ['ID','STAGE_ID','OPPORTUNITY','CURRENCY_ID','CLOSED','DATE_CREATE','CLOSEDATE','ASSIGNED_BY_ID']
  });
}
 
async function fetchUserNames(webhook, ids){
  const data = await callMethod(webhook, 'user.get', {FILTER: {ID: ids}});
  const map = {};
  (data.result || []).forEach(u => {
    const name = `${u.NAME || ''} ${u.LAST_NAME || ''}`.trim();
    map[u.ID] = name || `Сотрудник ID ${u.ID}`;
  });
  return map;
}
 
// ===== Реестр CRM-адаптеров =====
// Каждый адаптер приводит свою CRM к общему виду, который понимает остальной код:
// fetchFunnels -> [{id, name}]
// fetchStages(conn, funnelId) -> [{id, name}]
// fetchDeals(conn, funnelId, period) -> [{id, stageId, amount, currency, assignedTo, createdAt, closedAt, semantic}]
//   semantic: 'S' (успешна), 'F' (провалена), 'P' (в процессе) — считает сам адаптер,
//   т.к. у каждой CRM свой способ понять, выиграна сделка или нет.
// fetchUserNames(conn, ids) -> {id: 'Имя Фамилия'}
// Чтобы добавить новую CRM — реализовать этот же набор методов, ничего в остальном коде менять не нужно.
 
const CRM_ADAPTERS = {
  bitrix24: {
    id: 'bitrix24', name: 'Bitrix24', status: 'ready',
    subText: 'Живые данные напрямую из Битрикс24 через бесплатный вебхук, без программистов и подписок',
    fields: [

function fmtMoney(n, currency){
  const num = Math.round(n).toLocaleString('ru-RU');
  return `${num}${currency ? ' ' + currency : ''}`;
}
 
function deltaBadge(current, prev, hasPrev){
  if(!hasPrev) return '';
  if(prev === 0 && current === 0) return `<div class="delta flat">— нет данных за прошлый период</div>`;
  if(prev === 0) return `<div class="delta up">▲ новые продажи (прошлый период пуст)</div>`;
  const pct = Math.round(((current - prev) / prev) * 100);
  if(pct > 0) return `<div class="delta up">▲ +${pct}% к прошлому периоду</div>`;
  if(pct < 0) return `<div class="delta down">▼ ${pct}% к прошлому периоду</div>`;
  return `<div class="delta flat">— без изменений к прошлому периоду</div>`;
}
 
function buildFunnelSVG(stages, color, uid){
  const w = 320, h = 118, pad = 6, baseline = h - 24;
  const maxCount = Math.max(1, ...stages.map(s => s.count));
  const n = stages.length || 1;
  const segW = (w - pad*2) / n;
  let shapes = '';
  stages.forEach((s, i) => {
    const ratio = s.count / maxCount;
    const barH = 26 + ratio * (h - 26 - 24);
    const x = pad + i*segW;
    const y = baseline - barH;
    const opacity = 0.35 + 0.65 * ratio;
    const sumLabel = fmtMoney(s.sum, '');
    shapes += `<rect class="bar" data-target-h="${barH}" data-target-y="${y}"
        x="${x+2}" y="${baseline}" width="${segW-4}" height="0" rx="4"
        fill="${color}" opacity="${opacity.toFixed(2)}">
        <title>${s.name}: ${s.count} сделок, ${sumLabel}</title>
      </rect>`;
    shapes += `<text class="bar-label" x="${x + segW/2}" y="${h-8}" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#5B6478">${s.count}</text>`;
  });
  return `<svg class="funnel-svg" data-uid="${uid}" viewBox="0 0 ${w} ${h}" width="100%" height="${h}" xmlns="http://www.w3.org/2000/svg">${shapes}</svg>`;
}
 
function buildDailyChartSVG(entries, currency){
  if(entries.length === 0) return `<div class="managers-note">За выбранный период нет закрытых успешных сделок.</div>`;
  const barW = 30, gap = 10, padL = 8, padR = 8, h = 160, baseline = h - 28;
  const w = padL + padR + entries.length * (barW + gap) - gap;
  const maxSum = Math.max(1, ...entries.map(e => e.sum));
  let shapes = '';
  entries.forEach((e, i) => {
    const ratio = e.sum / maxSum;
    const barH = Math.max(3, ratio * (baseline - 20));
    const x = padL + i * (barW + gap);
    const y = baseline - barH;
    shapes += `<rect class="dbar" data-target-h="${barH}" data-target-y="${y}"
        x="${x}" y="${baseline}" width="${barW}" height="0" rx="5" fill="var(--blue)" opacity="0.85">
        <title>${e.label}: ${fmtMoney(e.sum, currency)}, сделок: ${e.count}</title>
      </rect>`;
    shapes += `<text x="${x + barW/2}" y="${h-8}" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#5B6478">${e.shortLabel}</text>`;
  });
  return `<svg class="funnel-svg" viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="xMinYMid meet" xmlns="http://www.w3.org/2000/svg">${shapes}</svg>`;
}
 
function animateBars(selector){
  requestAnimationFrame(() => {
    document.querySelectorAll(selector).forEach(rect => {
      const targetH = rect.dataset.targetH;
      const targetY = rect.dataset.targetY;
      requestAnimationFrame(() => {
        rect.setAttribute('height', targetH);
        rect.setAttribute('y', targetY);
      });
    });
  });
}
 
function animateCountUps(){
  document.querySelectorAll('[data-countup]').forEach(el => {
    const target = parseFloat(el.dataset.countup) || 0;
    const suffix = el.dataset.suffix || '';
    const suffixHtml = el.dataset.suffixHtml || '';
    const duration = 700;
    const start = performance.now();
    function tick(now){
      const progress = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = Math.round(target * eased);
      el.innerHTML = current.toLocaleString('ru-RU') + suffixHtml + (suffix && !suffixHtml ? suffix : '');
      if(progress < 1) requestAnimationFrame(tick);
      else el.innerHTML = target.toLocaleString('ru-RU') + suffixHtml + (suffix && !suffixHtml ? suffix : '');
    }
    requestAnimationFrame(tick);
  });
}
 
function renderError(msg, raw){
  statusLine.className = 'status-line err';
  let hint = '';
  if(raw instanceof TypeError || /failed to fetch|networkerror|load failed/i.test(msg)){
    hint = ' Похоже на блокировку запроса браузером. Частые причины: 1) файл открыт с компьютера (file://) — разместите его на https-хостинге; 2) в ссылке вебхука нет "https://" или лишние пробелы; 3) у вебхука не включено право доступа crm.';
  }
  statusLine.innerHTML = `Ошибка: ${msg}.${hint}`;
}
 
function renderLoading(msg){
  statusLine.className = 'status-line';
  statusLine.innerHTML = `<span class="spinner" style="border-color:#5B6478aa;border-top-color:#14213D;"></span>${msg}`;
}
 
async function loadDashboard(){
  if(!currentAdapter || !currentConn){
    renderError('сначала подключите CRM выше');
    return;
  }
  const adapter = currentAdapter;
  const conn = currentConn;
  connectBtn.disabled = true;
  connectBtn.textContent = 'Подключение…';
  renderLoading('получаю список воронок…');
 
  try{
    const rawFunnels = await adapter.fetchFunnels(conn);
    const seenIds = new Set();
    const allFunnels = rawFunnels.filter(c => {
      const key = String(c.id);
      if(seenIds.has(key)) return false;
      seenIds.add(key);
      return true;
    });
 
    const prevPeriod = computePrevPeriod(currentPeriod);
    const managerMap = {};   // id -> {dealsCount, wonSum, wonCount, lostCount}
    const dailyMap = {};     // dateKey -> {sum, count}
    const isAllTime = currentPeriod.type === 'all';
 
    const funnels = [];
    for(let i = 0; i < allFunnels.length; i++){
      const fn = allFunnels[i];
      renderLoading(`загружаю сделки — ${fn.name} (${i+1}/${allFunnels.length})…`);
 
      const promises = [
        adapter.fetchStages(conn, fn.id),
        adapter.fetchDeals(conn, fn.id, currentPeriod)
      ];
      if(prevPeriod) promises.push(adapter.fetchDeals(conn, fn.id, prevPeriod));
      const results = await Promise.all(promises);
      const stageOrder = results[0], deals = results[1];
      const prevDeals = prevPeriod ? results[2] : [];
 
      const stageMap = {};
      stageOrder.forEach(s => stageMap[s.id] = {name: s.name, count: 0, sum: 0});
 
      let totalSum = 0, wonSum = 0, wonCount = 0, lostCount = 0, currency = '';
      const dealIds = new Set();
 
      deals.forEach(d => {
        dealIds.add(d.id);
        const amount = d.amount || 0;
        currency = d.currency || currency;
        if(!stageMap[d.stageId]) stageMap[d.stageId] = {name: d.stageId, count: 0, sum: 0};
        stageMap[d.stageId].count += 1;
        stageMap[d.stageId].sum += amount;
        totalSum += amount;
 
        // разбивка по менеджерам
        const mgr = d.assignedTo || 'unknown';
        if(!managerMap[mgr]) managerMap[mgr] = {dealsCount: 0, wonSum: 0, wonCount: 0, lostCount: 0};
        managerMap[mgr].dealsCount += 1;
 
        if(d.semantic === 'S'){
          wonSum += amount; wonCount += 1;
          managerMap[mgr].wonSum += amount;
          managerMap[mgr].wonCount += 1;
          // динамика по дням/месяцам — только закрытые успешные сделки
          const rawDate = d.closedAt || d.createdAt;
          if(rawDate){
            const dateKey = isAllTime ? rawDate.slice(0,7) : rawDate.slice(0,10);
            if(!dailyMap[dateKey]) dailyMap[dateKey] = {sum: 0, count: 0};
            dailyMap[dateKey].sum += amount;
            dailyMap[dateKey].count += 1;
          }
        }
        if(d.semantic === 'F'){ lostCount += 1; managerMap[mgr].lostCount += 1; }
      });
 
      let prevWonSum = 0;
      prevDeals.forEach(d => { if(d.semantic === 'S') prevWonSum += (d.amount || 0); });
 
      const stages = stageOrder
        .map(s => ({name: s.name, count: stageMap[s.id].count, sum: stageMap[s.id].sum}))
        .filter(s => s.count > 0 || stageOrder.length <= 8);
 
      if(deals.length > 0 || rawFunnels.length > 0 || fn.id === 0){
        funnels.push({
          id: fn.id, name: fn.name, deals: deals.length, totalSum, wonSum,
          wonCount, lostCount, currency, stages, dealIds,
          prevWonSum, hasPrevPeriod: !!prevPeriod
        });
      }
    }
 
    const activeFunnels = funnels.filter(f => f.deals > 0);
    const displayFunnels = activeFunnels.length > 0 ? activeFunnels : funnels;
 
    // резолвим имена менеджеров
    const managerIds = Object.keys(managerMap).filter(id => id !== 'unknown');
    let nameMap = {};
    let namesResolved = true;
    if(managerIds.length > 0){
      try{
        nameMap = await adapter.fetchUserNames(conn, managerIds);
      }catch(e){
        namesResolved = false;
      }
    }
    const managers = Object.keys(managerMap).map(id => ({
      id,
      name: id === 'unknown' ? 'Без ответственного' : (nameMap[id] || `Сотрудник ID ${id}`),
      ...managerMap[id]
    })).sort((a,b) => b.wonSum - a.wonSum);
 
    // дневная/месячная динамика продаж
    const dailyEntries = Object.keys(dailyMap).sort().map(key => {
      const label = isAllTime
        ? new Date(key+'-01').toLocaleDateString('ru-RU', {month:'short', year:'numeric'})
        : new Date(key).toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'});
      const shortLabel = isAllTime ? key.slice(2) : key.slice(8,10);
      return {label, shortLabel, sum: dailyMap[key].sum, count: dailyMap[key].count};
    });
 
    // проверка на задвоенные воронки (одинаковый набор сделок в двух воронках)
    const dupPairs = [];
    for(let a = 0; a < activeFunnels.length; a++){
      for(let b = a+1; b < activeFunnels.length; b++){
        const fa = activeFunnels[a], fb = activeFunnels[b];
        if(fa.dealIds.size > 0 && fa.dealIds.size === fb.dealIds.size){
          let identical = true;
          for(const id of fa.dealIds){ if(!fb.dealIds.has(id)){ identical = false; break; } }
          if(identical) dupPairs.push([fa.name, fb.name, fa.id, fb.id]);
        }
      }
    }
 
    lastFunnels = displayFunnels;
    lastManagers = managers;
 
    renderDashboard(displayFunnels, managers, dailyEntries, namesResolved, managerIds.length > 0);
 
    if(dupPairs.length > 0){
      dupWarning.style.display = 'block';
      dupWarning.innerHTML = `<b>⚠ Похоже на задвоенные воронки</b>` + dupPairs.map(p =>
        `«${p[0]}» (ID ${p[2]}) и «${p[1]}» (ID ${p[3]}) показывают абсолютно одинаковый набор сделок.`
      ).join('<br>') + ` Проверьте настройки воронок в вашей CRM — вероятно, это одна и та же воронка под разными названиями.`;
    } else {
      dupWarning.style.display = 'none';
    }
 
    statusLine.className = 'status-line ok';
    statusLine.textContent = `Подключено (${adapter.name}) · найдено воронок: ${displayFunnels.length}`;
    helpBox.style.display = 'none';
    refreshBtn.style.display = 'inline-block';
    periodBar.style.display = 'flex';
    toolbar2.style.display = 'flex';
    updatedAt.textContent = new Date().toLocaleString('ru-RU');
 
  }catch(e){
    renderError(e.message || 'не удалось получить данные. Проверьте данные подключения и права доступа.', e);
  }finally{
    connectBtn.disabled = false;
    connectBtn.textContent = 'Подключить';
  }
}
 
function renderDashboard(funnels, managers, dailyEntries, namesResolved, hasManagers){
  if(funnels.length === 0){
    content.innerHTML = `<div class="empty-state">Сделки не найдены ни в одной воронке.</div>`;
    return;
  }
 
  const totalRevenue = funnels.reduce((a,f) => a + f.wonSum, 0);
  const totalPrevRevenue = funnels.reduce((a,f) => a + f.prevWonSum, 0);
  const hasPrev = funnels.some(f => f.hasPrevPeriod);
  const totalDeals = funnels.reduce((a,f) => a + f.deals, 0);
  const totalWon = funnels.reduce((a,f) => a + f.wonCount, 0);
  const totalLost = funnels.reduce((a,f) => a + f.lostCount, 0);
  const winRate = (totalWon + totalLost) > 0 ? Math.round(100 * totalWon / (totalWon + totalLost)) : 0;
  const currency = funnels.find(f => f.currency)?.currency || '';
 
  let html = `
    <div class="kpis">
      <div class="kpi">
        <div class="label">Продажи (выиграно)</div>
        <div class="value" data-countup="${totalRevenue}" data-suffix=" ${currency}">0 ${currency}</div>
        ${deltaBadge(totalRevenue, totalPrevRevenue, hasPrev)}
      </div>
      <div class="kpi"><div class="label">Сделок всего</div><div class="value" data-countup="${totalDeals}">0</div></div>
      <div class="kpi"><div class="label">Выиграно сделок</div><div class="value" data-countup="${totalWon}">0</div></div>
      <div class="kpi"><div class="label">Конверсия в продажу</div><div class="value" data-countup="${winRate}" data-suffix-html="<small>%</small>">0<small>%</small></div></div>
    </div>
 
    <p class="section-title">Динамика продаж</p>
    <div class="daily-chart">${buildDailyChartSVG(dailyEntries, currency)}</div>
 
    <p class="section-title">Воронки продаж <span class="n">${funnels.length}</span></p>
    <div class="funnels">
  `;
 
  funnels.forEach((f, i) => {
    const color = PALETTE[i % PALETTE.length];
    const fWinRate = (f.wonCount + f.lostCount) > 0 ? Math.round(100*f.wonCount/(f.wonCount+f.lostCount)) : 0;
    const stageRows = f.stages.map(s => `
      <tr>
        <td class="sname">${s.name}</td>
        <td class="scount">${s.count}</td>
        <td class="ssum">${fmtMoney(s.sum, '')}</td>
      </tr>
    `).join('');
 
    html += `
      <div class="fcard">
        <div class="fcard-head">
          <div class="fcard-name"><span class="fcard-dot" style="background:${color}"></span>${f.name} <span class="fcard-id">ID ${f.id}</span></div>
        </div>
        <div class="fcard-metrics">
          <div><div class="m-label">Продажи</div><div class="m-value">${fmtMoney(f.wonSum, f.currency)}</div>${deltaBadge(f.wonSum, f.prevWonSum, f.hasPrevPeriod)}</div>
          <div><div class="m-label">Сделок</div><div class="m-value">${f.deals}</div></div>
          <div><div class="m-label">Конверсия</div><div class="m-value">${fWinRate}%</div></div>
        </div>
        <div class="funnel-svg-wrap">${buildFunnelSVG(f.stages, color, f.id)}</div>
        <table class="stage-table"><tbody>${stageRows}</tbody></table>
      </div>
    `;
  });
 
  html += `</div>`;
 
  if(hasManagers){
    const rows = managers.map(m => {
      const conv = (m.wonCount + m.lostCount) > 0 ? Math.round(100*m.wonCount/(m.wonCount+m.lostCount)) : 0;
      return `
        <tr>
          <td class="mname">${m.name}</td>
          <td class="num">${m.dealsCount}</td>
          <td class="num">${fmtMoney(m.wonSum, currency)}</td>
          <td class="num">${conv}%</td>
        </tr>
      `;
    }).join('');
    html += `
      <p class="section-title">По менеджерам</p>
      <div class="managers-wrap">
        <table class="managers-table">
          <thead><tr><th>Менеджер</th><th class="num">Сделок</th><th class="num">Продажи</th><th class="num">Конверсия</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${namesResolved ? '' : '<div class="managers-note">Не удалось получить имена сотрудников — добавьте вебхуку право доступа <b>user</b> (Пользователи), пока показаны ID.</div>'}
      </div>
    `;
  }
 
  content.innerHTML = html;
  animateBars('.bar');
  animateBars('.dbar');
  animateCountUps();
}
 
exportBtn.addEventListener('click', () => {
  if(lastFunnels.length === 0) return;
  const rows = [];
  rows.push(['Воронка','Стадия','Сделок','Сумма'].join(';'));
  lastFunnels.forEach(f => {
    f.stages.forEach(s => rows.push([f.name, s.name, s.count, Math.round(s.sum)].join(';')));
  });
  rows.push('');
  if(lastManagers.length > 0){
    rows.push(['Менеджер','Сделок','Продажи (выиграно)','Конверсия %'].join(';'));
    lastManagers.forEach(m => {
      const conv = (m.wonCount + m.lostCount) > 0 ? Math.round(100*m.wonCount/(m.wonCount+m.lostCount)) : 0;
      rows.push([m.name, m.dealsCount, Math.round(m.wonSum), conv].join(';'));
    });
  }
  const csv = rows.join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sales-report-${fmtDateISO(new Date())}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});
 
autoRefreshSelect.addEventListener('change', () => {
  if(autoRefreshTimer) clearInterval(autoRefreshTimer);
  const minutes = parseInt(autoRefreshSelect.value, 10);
  if(minutes > 0){
    autoRefreshTimer = setInterval(() => {
      if(currentConn) loadDashboard();
    }, minutes * 60 * 1000);
  }
});
 
function attemptConnect(){
  const adapter = CRM_ADAPTERS[crmSelect.value];
  const raw = {};
  connFields.querySelectorAll('[data-field]').forEach(el => { raw[el.dataset.field] = el.value; });
  const validation = adapter.validate(raw);
  if(!validation.ok){
    renderError(validation.message);
    return;
  }
  currentAdapter = adapter;
  currentConn = adapter.buildConnection(raw);
  loadDashboard();
}
 
crmSelect.addEventListener('change', onCrmChange);
connectBtn.addEventListener('click', attemptConnect);
refreshBtn.addEventListener('click', loadDashboard);
connFields.addEventListener('keydown', e => { if(e.key === 'Enter') attemptConnect(); });
 
renderCrmSelect();
crmSelect.value = 'bitrix24';
onCrmChange();
 
(function initFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const wh = params.get('wh');
  if(wh){
    try{
      crmSelect.value = 'bitrix24';
      onCrmChange();
      const webhookField = connFields.querySelector('[data-field="webhook"]');
      if(webhookField){
        webhookField.value = atob(wh);
        attemptConnect();
      }
    }catch(e){ /* игнорируем некорректный параметр */ }
  }
})();
</script>
